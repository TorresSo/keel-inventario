services:
  postgres:
    image: postgres:15-alpine
    container_name: keel-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: keel_inventario
    ports:
      - "5432:5432"
    volumes:
      - keel_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d keel_inventario"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build: ./backend
    container_name: keel-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/keel_inventario
      SECRET_KEY: dev-secret-change-in-production-please-use-32-chars-min
      ACCESS_TOKEN_EXPIRE_MINUTES: "480"
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: keel-frontend
    depends_on:
      - backend
    ports:
      - "5173:80"
    restart: unless-stopped

volumes:
  keel_pg_data:
